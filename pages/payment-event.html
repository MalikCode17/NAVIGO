<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pembayaran Tiket Acara | Navigo</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/checkout.css">
    <link rel="stylesheet" href="../assets/css/payment.css">
</head>
<body>

    <!-- MINIMAL NAVBAR -->
    <header class="checkout-navbar">
        <div class="container">
            <a href="../index.html" class="logo" style="text-decoration: none;">
                <i class="fa-solid fa-plane-departure" style="color: var(--primary-blue); font-size: 24px;"></i>
                <h1 style="color: var(--primary-blue); font-size: 24px; font-weight: 800; margin-left: 8px; display: inline-block;">Navigo</h1>
            </a>
            
            <div class="secure-badge">
                <i class="fa-solid fa-shield-halved"></i>
                Pembayaran Aman
            </div>
        </div>
    </header>

    <!-- COUNTDOWN TIMER -->
    <div class="timer-banner">
        <div class="container timer-content">
            <i class="fa-regular fa-clock"></i>
            Selesaikan pembayaran Anda dalam
            <span id="countdown-timer">00:59:59</span>
        </div>
    </div>

    <main class="container">
        <div class="checkout-layout">
            
            <!-- LEFT COLUMN: PAYMENT METHODS -->
            <div class="checkout-main">
                
                <section class="checkout-card">
                    <div class="card-header">
                        <i class="fa-solid fa-wallet"></i>
                        <h3>Pilih Metode Pembayaran</h3>
                    </div>
                    
                    <div class="payment-methods">
                        
                        <!-- Accordion 1: Transfer Virtual Account -->
                        <div class="accordion-item active">
                            <button class="accordion-header" type="button">
                                <div class="accordion-header-left">
                                    <i class="fa-solid fa-building-columns icon-type"></i>
                                    Transfer Virtual Account (VA)
                                </div>
                                <i class="fa-solid fa-chevron-down"></i>
                            </button>
                            <div class="accordion-body">
                                <div class="payment-options">
                                    <label class="radio-label">
                                        <div class="radio-left">
                                            <input type="radio" name="payment_method" value="bca" checked>
                                            <span class="bank-name">BCA Virtual Account</span>
                                        </div>
                                        <i class="fa-solid fa-check" style="color: var(--primary-blue); display: none;"></i>
                                    </label>
                                    
                                    <label class="radio-label">
                                        <div class="radio-left">
                                            <input type="radio" name="payment_method" value="mandiri">
                                            <span class="bank-name">Mandiri Virtual Account</span>
                                        </div>
                                    </label>
                                    
                                    <label class="radio-label">
                                        <div class="radio-left">
                                            <input type="radio" name="payment_method" value="bni">
                                            <span class="bank-name">BNI Virtual Account</span>
                                        </div>
                                    </label>
                                </div>
                            </div>
                        </div>

                        <!-- Accordion 2: E-Wallet -->
                        <div class="accordion-item">
                            <button class="accordion-header" type="button">
                                <div class="accordion-header-left">
                                    <i class="fa-solid fa-mobile-screen icon-type"></i>
                                    Dompet Digital (E-Wallet)
                                </div>
                                <i class="fa-solid fa-chevron-down"></i>
                            </button>
                            <div class="accordion-body">
                                <div class="payment-options">
                                    <label class="radio-label">
                                        <div class="radio-left">
                                            <input type="radio" name="payment_method" value="gopay">
                                            <span class="bank-name">GoPay</span>
                                        </div>
                                    </label>
                                    
                                    <label class="radio-label">
                                        <div class="radio-left">
                                            <input type="radio" name="payment_method" value="ovo">
                                            <span class="bank-name">OVO</span>
                                        </div>
                                    </label>
                                </div>
                            </div>
                        </div>

                        <!-- Accordion 3: Kartu Kredit -->
                        <div class="accordion-item">
                            <button class="accordion-header" type="button">
                                <div class="accordion-header-left">
                                    <i class="fa-regular fa-credit-card icon-type"></i>
                                    Kartu Kredit / Debit
                                </div>
                                <i class="fa-solid fa-chevron-down"></i>
                            </button>
                            <div class="accordion-body">
                                <div class="payment-options" style="background-color: var(--white); border-radius: 8px; margin: 16px;">
                                    <div class="form-group">
                                        <label>Nomor Kartu</label>
                                        <input type="text" placeholder="0000 0000 0000 0000">
                                    </div>
                                    <div class="form-row">
                                        <div class="form-group">
                                            <label>Berlaku Hingga</label>
                                            <input type="text" placeholder="MM/YY">
                                        </div>
                                        <div class="form-group">
                                            <label>CVV</label>
                                            <input type="text" placeholder="123">
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                    </div>
                </section>
            </div>

            <!-- RIGHT COLUMN: TOTAL BILL -->
            <div class="checkout-sidebar">
                <div class="sticky-sidebar">
                    <section class="checkout-card">
                        
                        <div class="order-id">
                            Nomor Pesanan:<br>
                            <span>NVG-20240519-8832</span>
                        </div>

                        <div class="summary-total" style="flex-direction: column; align-items: flex-start; margin-bottom: 24px;">
                            <span style="font-size: 14px; color: var(--text-gray); font-weight: 500; margin-bottom: 8px;">Total Pembayaran</span>
                            <span class="total-price" style="font-size: 28px;">IDR 313.500</span>
                        </div>

                        <div class="info-box" style="margin-bottom: 24px;">
                            <i class="fa-solid fa-lock"></i>
                            <p style="font-size: 12px;">Data Anda dilindungi dengan enkripsi SSL 256-bit.</p>
                        </div>

                        <button type="button" class="btn-checkout" id="btn-pay-now" style="margin-bottom: 12px;">Bayar Sekarang</button>
                        <button type="button" id="btn-cancel-order" style="width: 100%; padding: 14px; background: transparent; border: 1px solid var(--danger-red); color: var(--danger-red); border-radius: 8px; font-weight: 600; cursor: pointer; transition: all 0.2s;">Batalkan Pesanan</button>
                    </section>
                </div>
            </div>

        </div>
    </main>

    <!-- FOOTER SECTION -->
    <footer class="site-footer">
        <p>&copy; 2024 Navigo. All rights reserved. 100% Secure & Encrypted.</p>
    </footer>

    <script src="../assets/js/payment-event.js"></script>
    <script src="../assets/js/storage.js"></script>
    <script src="../assets/js/utilities.js"></script>
    <script src="../assets/js/navbar.js"></script>
    <script src="../assets/js/main.js"></script>
</body>
</html>
